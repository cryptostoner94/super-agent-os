name: Supreme AI Agent OS — CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supreme-ai-agent-os

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import smoke test
        run: |
          python -c "from backend.app.uac.soul.soul import Soul; print('soul: ok')"
          python -c "from backend.app.uac.identity.identity import Identity; print('identity: ok')"
          python -c "from backend.app.agents.registry import AGENTS; print(f'agents: {len(AGENTS)}')"
          python -c "from backend.app.inception import classify_intent; print('intent:', classify_intent('write a function'))"
          python -c "from backend.app.graph import build_graph; g=build_graph(); print('langgraph: ok')"

      - name: Run unit tests
        run: pytest tests/ -x -q --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supreme-ai-agent-os

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t supreme-ai-api:ci .

      - name: Check .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git — must not be committed"
            exit 1
          fi
          echo "OK: .env not tracked"

      - name: Check no secrets in git history
        run: |
          FOUND=$(git log --all --full-history -- \
            "*identity_secret*" "*encryption_key*" "*session_signing*" 2>/dev/null | wc -l)
          if [ "$FOUND" -gt 0 ]; then
            echo "ERROR: Secret files found in git history"
            exit 1
          fi
          echo "OK: No secrets in git history"
