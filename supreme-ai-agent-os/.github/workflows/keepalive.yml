name: HF Space Keepalive

on:
  schedule:
    - cron: '*/25 * * * *'   # every 25 minutes, 24/7
  workflow_dispatch:          # manual trigger if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          curl -sf "${{ secrets.HF_SPACE_URL }}/health" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            -o /dev/null \
            && echo "Space is alive" \
            || echo "Space warming up (cold start) — will retry next cycle"
