services:
  api:
    build: .
    container_name: supreme-api
    restart: unless-stopped
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SUPREME_DB_DIR=/app/data/state
      - UAC_ROOT=/app/data/.supreme-os
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - BROWSERLESS_URL=${BROWSERLESS_URL:-ws://browserless:3000}
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      - PLAYWRIGHT_BROWSERS_PATH=0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_started
      browserless:
        condition: service_started
    networks:
      - supreme-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: supreme-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - SUPREME_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - supreme-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: frontend/next-app/Dockerfile
    container_name: supreme-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - supreme-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  browserless:
    image: browserless/chrome:latest
    container_name: supreme-browserless
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
      - ENABLE_CORS=true
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
    networks:
      - supreme-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram:
    build: .
    container_name: supreme-telegram
    restart: unless-stopped
    command: python telegram_bot/bot.py
    env_file:
      - .env
    environment:
      - SUPREME_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - supreme-net
    profiles:
      - telegram
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ollama:
    image: ollama/ollama:latest
    container_name: supreme-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - supreme-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: supreme-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - supreme-net
    profiles:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  supreme-net:
    driver: bridge

volumes:
  ollama-models:
  redis-data:
