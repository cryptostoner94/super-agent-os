services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supreme-backend
    ports:
      - "8000:8000"
    environment:
      - SUPREME_APP_ENV=production
      - SUPREME_ALLOW_TERMINAL=false
      - PYTHONUNBUFFERED=1
      - OLLAMA_ENABLED=true
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=llama2
      - OLLAMA_MODEL_2=gpt4all-mini
      - OLLAMA_MODEL_3=orca-mini
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - supreme-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: supreme-frontend
    ports:
      - "8501:8501"
    environment:
      - SUPREME_API_URL=http://backend:8000
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./frontend:/app/frontend
      - ./.env:/app/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - supreme-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: supreme-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - supreme-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  ollama:
    image: ollama/ollama:latest
    container_name: supreme-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - supreme-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  supreme-network:
    driver: bridge

volumes:
  data:
    driver: local
  ollama_data:
    driver: local
