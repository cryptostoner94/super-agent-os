services:
  supreme-api:
    build: .
    command: ./venv/bin/python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
  supreme-ui:
    build: .
    command: ./venv/bin/streamlit run frontend/streamlit/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - supreme-api
