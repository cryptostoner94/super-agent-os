name: EC2 Remote Exec

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to run on EC2'
        required: true
        default: 'docker ps && curl -s http://localhost:8000/health | python3 -m json.tool'
      working_dir:
        description: 'Working directory'
        required: false
        default: '~/app'

jobs:
  exec:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ${{ github.event.inputs.working_dir }} 2>/dev/null || true
            ${{ github.event.inputs.command }}
